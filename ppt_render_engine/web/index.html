<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PPT Render Engine</title>
<style>
:root{--bg:#f0f2f5;--surface:#fff;--primary:#1a73e8;--primary-hover:#1557b0;--border:#d0d5dd;--text:#1d1d1f;--text-secondary:#6b7280;--success:#16a34a;--danger:#dc2626;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:18px;font-weight:600}
header nav{display:flex;gap:6px}
.layout{display:flex;gap:16px;padding:16px;height:calc(100vh - 53px)}
.panel{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;overflow:auto}
.panel-left{width:420px;min-width:420px;display:flex;flex-direction:column;gap:10px}
.panel-right{flex:1;display:flex;flex-direction:column;gap:12px;overflow:hidden}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:18px 24px;text-align:center;cursor:pointer;transition:border-color .2s;flex-shrink:0}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--primary)}
.upload-zone.has-file{border-color:var(--success);border-style:solid}
.upload-zone .hint{font-size:12px;color:var(--text-secondary);margin-top:2px}
.row{display:flex;gap:8px;align-items:center;flex-shrink:0}
.row label{font-size:12px;font-weight:500;white-space:nowrap;min-width:54px}
.row select,.row input{flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--surface)}
.btn{padding:6px 14px;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:background .2s;flex-shrink:0}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#15803d}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:#f3f4f6}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ---- Shape list ---- */
#shape-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;min-height:0;padding-right:2px}
#shape-list:empty::after{content:'请上传 ZIP/JSON 文件';display:block;color:var(--text-secondary);font-size:13px;text-align:center;padding:40px 0}
.shape-card{border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:border-color .2s,box-shadow .2s;flex-shrink:0;background:#fafbfc}
.shape-card:hover{border-color:var(--primary);box-shadow:0 1px 3px rgba(26,115,232,.12)}
.shape-card.selected{border-color:var(--primary);box-shadow:0 0 0 2px rgba(26,115,232,.2);background:#eaf3ff}
.shape-card-header{display:flex;align-items:center;gap:6px;padding:8px 10px}
.shape-type-icon{width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.type-textbox{background:#5b9bd5}
.type-shape{background:#70ad47}
.type-image{background:#ed7d31}
.type-table{background:#9b59b6}
.shape-name{font-weight:600;color:var(--text);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;flex-shrink:0}
.shape-text-preview{color:var(--text-secondary);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.shape-pos{color:var(--text-secondary);font-size:10px;white-space:nowrap;flex-shrink:0;font-family:monospace}
.shape-expand{font-size:10px;color:var(--text-secondary);flex-shrink:0;transition:transform .2s}
.shape-expand.open{transform:rotate(90deg)}
.shape-card-details{display:none;padding:8px 10px;border-top:1px solid var(--border);font-size:11px;color:var(--text);background:#f8f9fb;border-radius:0 0 6px 6px}
.shape-card.open .shape-card-details{display:block}
.shape-card.open{border-color:#b3d4fc}
.detail-row{display:flex;gap:12px;padding:2px 0}
.detail-label{color:var(--text-secondary);min-width:70px;flex-shrink:0}
.detail-value{flex:1;word-break:break-all}
.color-swatch{display:inline-block;width:14px;height:14px;border-radius:2px;border:1px solid var(--border);vertical-align:middle;margin-right:4px}
.para-block{margin:4px 0;padding:4px 6px;background:#fff;border-radius:4px;border:1px solid #e5e7eb}
.run-text{font-weight:500}
.run-meta{color:var(--text-secondary);font-size:10px;margin-left:4px}
.empty-shape{color:var(--text-secondary);font-style:italic;font-size:11px;padding:4px 0}

/* ---- Slide preview ---- */
.preview-header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.preview-nav{display:flex;align-items:center;gap:6px;font-size:12px}
.preview-nav button{border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;font-size:13px;padding:0 8px;height:26px;display:flex;align-items:center}
.preview-nav button:hover{background:#f3f4f6}
.preview-nav button:disabled{opacity:.4}
#preview-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:auto;background:#f7f8fa;border-radius:6px;min-height:200px}
#preview-area .placeholder{color:var(--text-secondary);font-size:13px}
#slide-container{position:relative;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.12);border-radius:4px;background:#fff}
#slide-container .shape-el{position:absolute;cursor:pointer;border:1px solid transparent;transition:border-color .1s,box-shadow .1s,background .1s;overflow:hidden;display:flex;flex-direction:column;white-space:pre-wrap}
#slide-container .shape-el:hover{border-color:var(--primary);z-index:999}
#slide-container .shape-el.selected{border-color:var(--primary);box-shadow:inset 0 0 0 2px var(--primary);z-index:1000;background:rgba(26,115,232,.04)}
#slide-container .shape-table{display:flex;flex-direction:column;width:100%;height:100%}
#slide-container .shape-table .tr{display:flex;flex:1}
#slide-container .shape-table .td{flex:1;border:1px solid var(--border);padding:2px 4px;overflow:hidden;font-size:10px;display:flex;align-items:center}
#slide-container .shape-table .td.has-bg{color:#fff}

.selection-bar{display:flex;align-items:center;gap:8px;font-size:12px;flex-shrink:0;padding:4px 0}
#sel-info{font-size:11px;color:var(--text-secondary);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ---- Edit inputs ---- */
.edit-pos{width:58px;padding:1px 3px;border:1px solid var(--border);border-radius:3px;font-size:10px;font-family:monospace}
.edit-hex{width:70px;padding:1px 3px;border:1px solid var(--border);border-radius:3px;font-size:10px;font-family:monospace}
.edit-picker{width:24px;height:20px;padding:0;border:1px solid var(--border);border-radius:3px;cursor:pointer;vertical-align:middle}
.edit-text{padding:2px 4px;border:1px solid var(--border);border-radius:3px;font-size:11px}
.edit-pt{width:36px;padding:1px 2px;border:1px solid var(--border);border-radius:3px;font-size:10px}
.shape-json-toggle{font-size:10px;padding:2px 8px;margin-top:4px}
/* ---- Modals ---- */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.35);z-index:2000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-overlay .modal-box{background:var(--surface);border-radius:var(--radius);display:flex;flex-direction:column}
.modal-overlay .modal-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-overlay .modal-header span{font-weight:600;font-size:13px}
.modal-overlay .modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-secondary);padding:0 4px;line-height:1;outline:none}
.modal-overlay .modal-close:hover{color:var(--text)}
.modal-overlay iframe{flex:1;border:none;width:100%;display:block}
#json-textarea{flex:1;border:none;padding:10px 14px;font-family:monospace;font-size:11px;resize:vertical;min-height:240px;outline:none}
#json-modal .modal-footer{display:flex;gap:8px;justify-content:flex-end;padding:8px 12px;border-top:1px solid var(--border);flex-shrink:0}

.image-card{border:1px solid var(--border);border-radius:6px;overflow:hidden;background:#fff;width:140px;flex-shrink:0;cursor:default}
.image-card .thumb{width:140px;height:90px;display:flex;align-items:center;justify-content:center;background:#f3f4f6;overflow:hidden;border-bottom:1px solid var(--border)}
.image-card .thumb img{max-width:100%;max-height:100%;display:block}
.image-card .info{padding:4px 6px;font-size:10px;color:var(--text-secondary)}
.image-card .info .fname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;color:var(--text)}
.image-card .actions{display:flex;gap:2px;padding:2px 6px 6px}
.image-card .actions button{font-size:10px;padding:2px 6px}
@media(max-width:900px){.layout{flex-direction:column;height:auto}.panel-left{width:100%;min-width:0;max-height:50vh}}
</style>
</head>
<body>
<header>
<h1>PPT Render Engine</h1>
<div style="display:flex;align-items:center;gap:8px">
<button class="btn btn-outline" id="sync-load-btn">⬇ 同步</button>
<button class="btn btn-outline" id="sync-save-btn">⬆ 更新</button>
<button class="btn btn-outline" id="upload-json-btn">📂 上传文件</button>
<button class="btn btn-outline" id="reset-btn">🔄 重置</button>
<button class="btn btn-outline" id="open-image-btn">🖼 素材</button>
<button class="btn btn-outline" id="download-json-btn" disabled>📥 下载 ZIP</button>
</div>
<nav><button class="btn btn-outline" id="open-convert-btn">PPTX→JSON</button><button class="btn btn-outline" id="open-config-btn">配置</button></nav>
</header>
<div class="layout">
<div class="panel panel-left">
<div class="upload-zone" id="upload-zone">
<div class="hint" id="upload-hint">拖拽 JSON/ZIP 文件到此处，或点击选择</div>
<input type="file" id="file-input" accept=".json,.zip" style="display:none">
<input type="file" id="json-upload-input" accept=".json,.zip" style="display:none">
</div>
<div class="row"><label>模板</label><select id="tmpl-select"><option value="">—</option></select></div>
<div class="row"><label>配色</label><select id="scheme-select"><option value="">—</option></select></div>
<div class="row"><button class="btn btn-success" id="download-btn" disabled>下载 PPTX</button><button class="btn btn-outline" id="page-json-btn" disabled style="margin-left:auto">📄 本页 JSON</button></div>
<div id="shape-list"></div>
</div>
<div class="panel panel-right">
<div class="preview-header">
<span style="font-size:13px;font-weight:500">预览</span>
<div class="preview-nav">
<button id="prev-slide" disabled>&lsaquo;</button>
<span id="slide-indicator">0 / 0</span>
<button id="next-slide" disabled>&rsaquo;</button>
<button id="refresh-preview" class="btn btn-outline" disabled>刷新</button>
</div>
</div>
<div id="preview-area"><span class="placeholder">请上传 JSON 文件</span></div>
<div class="selection-bar">
<span style="font-size:11px;font-weight:500;color:var(--text-secondary)">Ctrl+点击多选 / 点击空白取消</span>
<span id="sel-info">未选中</span>
</div>
</div>
</div>

<!-- Shape JSON editor modal -->
<div id="json-modal" class="modal-overlay">
<div class="modal-box" style="width:75vw;max-width:720px;max-height:80vh">
<div class="modal-header"><span>Shape JSON 编辑</span><button class="modal-close" id="json-modal-close">&times;</button></div>
<textarea id="json-textarea" spellcheck="false"></textarea>
<div class="modal-footer">
<button class="btn btn-outline" id="json-modal-cancel">取消</button>
<button class="btn btn-primary" id="json-modal-apply">应用</button>
</div>
</div>
</div>

<!-- Page JSON modal -->
<div id="page-json-modal" class="modal-overlay">
<div class="modal-box" style="width:75vw;max-width:720px;max-height:80vh">
<div class="modal-header"><span>本页 JSON</span><button class="modal-close" id="page-json-modal-close">&times;</button></div>
<textarea id="page-json-textarea" spellcheck="false" style="flex:1;border:none;padding:10px 14px;font-family:monospace;font-size:11px;resize:vertical;min-height:240px;outline:none"></textarea>
<div class="modal-footer">
<button class="btn btn-outline" id="page-json-cancel">关闭</button>
<button class="btn btn-primary" id="page-json-apply">应用到当前页</button>
</div>
</div>
</div>

<!-- PPTX→JSON modal -->
<div id="convert-modal" class="modal-overlay">
<div class="modal-box" style="width:90vw;max-width:900px;height:85vh">
<div class="modal-header"><span>PPTX → JSON</span><button class="modal-close" id="convert-modal-close">&times;</button></div>
<iframe src="/convert-pptx"></iframe>
</div>
</div>

<!-- Config modal -->
<div id="config-modal" class="modal-overlay">
<div class="modal-box" style="width:90vw;max-width:900px;height:85vh">
<div class="modal-header"><span>配置管理</span><button class="modal-close" id="config-modal-close">&times;</button></div>
<iframe src="/config"></iframe>
</div>
</div>

<!-- Image material modal -->
<div id="image-modal" class="modal-overlay">
<div class="modal-box" style="width:80vw;max-width:800px;max-height:85vh">
<div class="modal-header"><span>图片素材管理</span><button class="modal-close" id="image-modal-close">&times;</button></div>
<div style="padding:10px 14px;flex:1;overflow:auto;display:flex;flex-direction:column;gap:10px">
<div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
<input type="file" id="image-upload-input" accept="image/*" style="display:none">
<button class="btn btn-primary" id="image-upload-btn">📤 上传图片</button>
<span id="image-upload-status" style="font-size:11px;color:var(--text-secondary)"></span>
<button class="btn btn-outline" id="image-refresh-btn" style="margin-left:auto">刷新</button>
</div>
<div id="image-grid" style="display:flex;flex-wrap:wrap;gap:10px;flex:1;align-content:flex-start;overflow-y:auto;padding:4px">
<span style="color:var(--text-secondary);font-size:12px">加载中...</span>
</div>
</div>
</div>
</div>

<script src="/jszip.min.js"></script>
<script>
const state={jsonData:null,jsonText:'',fileName:'',currentSlide:0,totalSlides:0,slideWidth:12192000,slideHeight:6858000,shapes:[],selectedIds:[]};

function saveState(){
try{localStorage.setItem('ppt_state',JSON.stringify({
jsonData:state.jsonData,jsonText:state.jsonText,fileName:state.fileName,
currentSlide:state.currentSlide,
template:tmplSelect&&tmplSelect.value,scheme:schemeSelect&&schemeSelect.value
}))}catch(e){}
}

function restoreState(){
try{
const s=JSON.parse(localStorage.getItem('ppt_state'));
if(!s||!s.jsonData||!s.jsonData.slides||!s.jsonData.slides.length)return;
state.jsonData=s.jsonData; state.jsonText=s.jsonText||'';
state.fileName=s.fileName||'';
state.currentSlide=s.currentSlide||0;
state.slideWidth=s.jsonData.slide_width||12192000;
state.slideHeight=s.jsonData.slide_height||6858000;
state.totalSlides=s.jsonData.slides.length;
if(s.template&&tmplSelect.querySelector('option[value="'+CSS.escape(s.template)+'"]'))tmplSelect.value=s.template;
if(s.scheme&&schemeSelect.querySelector('option[value="'+CSS.escape(s.scheme)+'"]'))schemeSelect.value=s.scheme;
uploadHint.textContent=s.fileName||'已恢复上次会话';
uploadZone.classList.add('has-file');
downloadBtn.disabled=false;downloadJsonBtn.disabled=false;pageJsonBtn.disabled=false;
 updateSlideNav();loadSlide(state.currentSlide);
}catch(e){console.warn('restoreState',e)}
}

const $=(id)=>document.getElementById(id);
const uploadZone=$('upload-zone'),fileInput=$('file-input'),uploadHint=$('upload-hint');
const tmplSelect=$('tmpl-select'),schemeSelect=$('scheme-select');
const downloadBtn=$('download-btn'),downloadJsonBtn=$('download-json-btn'),pageJsonBtn=$('page-json-btn');
const prevBtn=$('prev-slide'),nextBtn=$('next-slide'),slideInd=$('slide-indicator'),refreshBtn=$('refresh-preview');
const previewArea=$('preview-area'),shapeList=$('shape-list');
const selInfo=$('sel-info');

async function loadDropdowns(){
try{
const[tmplRes,schemeRes]=await Promise.all([fetch('/template/list'),fetch('/color-scheme/list')]);
if(tmplRes.ok){const d=await tmplRes.json();d.templates.forEach(t=>{const o=document.createElement('option');o.value=t.name;o.textContent=t.name;tmplSelect.appendChild(o)})}
if(schemeRes.ok){const d=await schemeRes.json();d.schemes.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;schemeSelect.appendChild(o)});if(d.default)schemeSelect.value=d.default}
}catch(e){console.warn('loadDropdowns',e)}
restoreState();
}
loadDropdowns().then(()=>{
tmplSelect.addEventListener('change',saveState);
schemeSelect.addEventListener('change',saveState);
});

uploadZone.addEventListener('click',()=>fileInput.click());
uploadZone.addEventListener('dragover',e=>{e.preventDefault();uploadZone.classList.add('dragover')});
uploadZone.addEventListener('dragleave',()=>uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop',e=>{e.preventDefault();uploadZone.classList.remove('dragover');if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0])});
fileInput.addEventListener('change',()=>{if(fileInput.files.length)handleFile(fileInput.files[0])});

async function handleFile(file){
const isZip=file.name.match(/\.zip$/i);
if(!isZip&&!file.name.endsWith('.json')){alert('仅支持 .zip 或 .json 文件');return}
state.fileName=file.name;
uploadHint.textContent=file.name;
uploadZone.classList.add('has-file');
let data,jsonText;
if(isZip){
try{
const ab=await file.arrayBuffer();
const zip=new JSZip();
const z=await zip.loadAsync(ab);
const entry=z.file('presentation.json');
if(!entry){alert('ZIP 中未找到 presentation.json');return}
jsonText=await entry.async('string');
data=JSON.parse(jsonText);
// Upload images in zip
const uploadPromises=[];
z.forEach((relPath, f)=>{
if(relPath.startsWith('images/')&&!f.dir){
uploadPromises.push((async()=>{
const fd=new FormData();
fd.append('file',new File([await f.async('blob')], relPath.replace('images/','')));
await fetch('/image/store',{method:'POST',body:fd}).catch(()=>{});
})());
}
});
await Promise.all(uploadPromises);
}catch(e){alert('ZIP 解析失败: '+e.message);return}
}else{
const text=await file.text();
try{data=JSON.parse(text);jsonText=text}catch(e){alert('JSON 解析失败: '+e.message);return}
}
state.jsonData=data;
state.jsonText=jsonText;
state.totalSlides=data.slides?data.slides.length:0;
state.currentSlide=0;
state.slideWidth=data.slide_width||12192000;
state.slideHeight=data.slide_height||6858000;
if(data.template_name&&tmplSelect.querySelector(`option[value="${CSS.escape(data.template_name)}"]`))tmplSelect.value=data.template_name;
if(data.color_scheme&&schemeSelect.querySelector(`option[value="${CSS.escape(data.color_scheme)}"]`))schemeSelect.value=data.color_scheme;
downloadBtn.disabled=false;downloadJsonBtn.disabled=false;pageJsonBtn.disabled=false;
updateSlideNav();
await loadSlide(0);
saveState();
fetch('/sync',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(state.jsonData)}).catch(()=>{});
}

function getCurrentJson(){
const data=state.jsonData?JSON.parse(JSON.stringify(state.jsonData)):{slides:[]};
const t=tmplSelect.value,s=schemeSelect.value;
if(t)data.template_name=t;else delete data.template_name;
if(s)data.color_scheme=s;else delete data.color_scheme;
return JSON.stringify(data,null,2);
}

downloadBtn.addEventListener('click',async()=>{
downloadBtn.disabled=true;downloadBtn.textContent='生成中...';
try{
// Build ZIP with presentation.json + images
const zip=new JSZip();
zip.file('presentation.json', getCurrentJson());
const seen=new Set();
(state.jsonData.slides||[]).forEach(s=>(s.shapes||[]).forEach(sh=>{
const img=sh.image_content;
if(img&&img.path&&!seen.has(img.path)){
seen.add(img.path);
const p=fetch('/image/'+encodeURIComponent(img.path)).then(r=>{if(!r.ok)throw Error();return r.blob()}).catch(()=>new Blob());
zip.file('images/'+img.path, p, {binary:true});
}
}));
const zipBlob=await zip.generateAsync({type:'blob'});
const fd=new FormData();fd.append('file',zipBlob,'slide.zip');
const qs=new URLSearchParams();
const t=tmplSelect.value;if(t)qs.set('template_name',t);
const s=schemeSelect.value;if(s)qs.set('color_scheme',s);
const res=await fetch(`/convert/json-to-pptx?${qs}`,{method:'POST',body:fd});
if(!res.ok){const e=await res.text();alert('生成失败: '+e);return}
const ab=await res.arrayBuffer();
const url=URL.createObjectURL(new Blob([ab]));
const name=(state.fileName||'slide').replace(/\.(json|zip)$/i,'')+'.pptx';
const a=document.createElement('a');a.href=url;a.download=name;a.click();
URL.revokeObjectURL(url);
}catch(e){alert('下载失败: '+e.message)}
finally{downloadBtn.disabled=false;downloadBtn.textContent='下载 PPTX'}
});

// ---- Download modified ZIP ----
downloadJsonBtn.addEventListener('click',async()=>{
const zip=new JSZip();
zip.file('presentation.json', JSON.stringify(state.jsonData,null,2));
// Collect image references from slides
const seen=new Set();
(state.jsonData.slides||[]).forEach(s=>(s.shapes||[]).forEach(sh=>{
const img=sh.image_content;
if(img&&img.path&&!seen.has(img.path)){
seen.add(img.path);
const p=fetch('/image/'+encodeURIComponent(img.path)).then(r=>{if(!r.ok)throw Error();return r.blob()}).catch(()=>new Blob());
zip.file('images/'+img.path, p, {binary:true});
}
}));
const blob=await zip.generateAsync({type:'blob'});
const url=URL.createObjectURL(blob);
const name2=(state.fileName||'slide').replace(/\.(json|zip)$/i,'')+'.zip';

async function loadSlide(idx){
if(!state.jsonData||!state.jsonData.slides||!state.jsonData.slides.length){previewArea.innerHTML='<span class="placeholder">无幻灯片数据</span>';return}
previewArea.innerHTML='<span class="placeholder">加载中...</span>';
refreshBtn.disabled=true;
try{
const json=getCurrentJson();
const blob=new Blob([json],{type:'application/json'});
const fd=new FormData();fd.append('file',blob,'slide.json');
const res=await fetch(`/render/preview-info?slide_index=${idx}`,{method:'POST',body:fd});
if(!res.ok){previewArea.innerHTML='<span class="placeholder">加载失败</span>';return}
const info=await res.json();
state.slideWidth=info.slide_width||state.slideWidth;
state.slideHeight=info.slide_height||state.slideHeight;
state.shapes=info.shapes||[];
renderHtmlSlide();
buildShapeList();
}catch(e){previewArea.innerHTML='<span class="placeholder">加载失败: '+e.message+'</span>'}
finally{refreshBtn.disabled=false}
}

// ---- HTML slide renderer ----
function renderHtmlSlide(){
previewArea.innerHTML='';
const container=document.createElement('div');container.id='slide-container';
previewArea.appendChild(container);
resizeSlideContainer(container);

// Background color
const bg=state.shapes.find(s=>s.type==='shape'&&s.auto_shape_type==='rectangle'&&s.left===0&&s.top===0&&s.width===state.slideWidth&&s.height===state.slideHeight);
if(bg&&bg.background_color)container.style.background=bg.background_color;

// Sort by z_order
const sorted=[...state.shapes].sort((a,b)=>(a.z_order||0)-(b.z_order||0));

const frag=document.createDocumentFragment();
sorted.forEach((s,i)=>{
const el=document.createElement('div');el.className='shape-el';el.dataset.index=i;
const l=(s.left/state.slideWidth*100).toFixed(4);
const t=(s.top/state.slideHeight*100).toFixed(4);
const w=(s.width/state.slideWidth*100).toFixed(4);
const h=(s.height/state.slideHeight*100).toFixed(4);
el.style.left=l+'%';el.style.top=t+'%';el.style.width=w+'%';el.style.height=h+'%';
el.title=(s.role||s.id||s.type)+(s.text_preview?' : '+s.text_preview:'');

// Background
if(s.background_color)el.style.background=s.background_color;

// Border
if(s.border_color){el.style.borderColor=s.border_color;el.style.borderStyle='solid';
el.style.borderWidth=(s.border_width?Math.max(1,s.border_width/12700)+'pt':'1px')}

// Rotation
if(s.rotation)el.style.transform='rotate('+s.rotation+'deg)';

// Content
if(s.type==='table'&&s.table){
const tb=document.createElement('div');tb.className='shape-table';
s.table.cells.forEach(row=>{
const tr=document.createElement('div');tr.className='tr';
row.forEach(cell=>{
const td=document.createElement('div');td.className='td';
if(cell.colspan>1)td.style.flex=cell.colspan;
if(cell.background_color){td.style.background=cell.background_color;td.classList.add('has-bg')}
if(cell.bold)td.style.fontWeight='bold';
td.textContent=cell.text;
tr.appendChild(td);
});
tb.appendChild(tr);
});
el.appendChild(tb);
}else if(s.type==='image'){
                el.style.background='#e8e8e8';el.style.display='flex';el.style.alignItems='center';el.style.justifyContent='center';
                el.style.color='#999';el.style.fontSize='10px';
                if(s.image_content&&s.image_content.url){
                    const img=document.createElement('img');
                    img.src=s.image_content.url;
                    img.style.maxWidth='100%';img.style.maxHeight='100%';img.style.objectFit='contain';
                    img.onerror=function(){this.style.display='none';this.parentElement.textContent='🖼'};
                    el.textContent='';el.appendChild(img);
                }else{el.textContent='🖼'}
            }else if(s.paragraphs&&s.paragraphs.length){
s.paragraphs.forEach(p=>{
const pdiv=document.createElement('div');
pdiv.style.padding='2px 4px';
if(p.alignment&&p.alignment!=='left')pdiv.style.textAlign=p.alignment;
(p.runs||[]).forEach(r=>{
const span=document.createElement('span');
span.textContent=r.text;
if(r.font_size){const pt=r.font_size/12700;span.style.fontSize=Math.max(4,Math.min(pt,96))+'pt'}
if(r.font_name)span.style.fontFamily=r.font_name;
if(r.bold)span.style.fontWeight='bold';
if(r.italic)span.style.fontStyle='italic';
if(r.underline)span.style.textDecoration='underline';
if(r.color)span.style.color=r.color;
pdiv.appendChild(span);
});
el.appendChild(pdiv);
});
}

// Selection
el.addEventListener('click',e=>{e.stopPropagation();handleSelect(e,i)});

frag.appendChild(el);
});
container.appendChild(frag);

if(state.selectedIds.length)highlightShapes(state.selectedIds);
}

function resizeSlideContainer(container){
const pa=previewArea;
const maxW=Math.max(200,pa.clientWidth-32);
const maxH=Math.max(150,pa.clientHeight-32);
const aspect=state.slideWidth/state.slideHeight;
let w=maxW,h=w/aspect;
if(h>maxH){h=maxH;w=h*aspect}
container.style.width=Math.round(w)+'px';
container.style.height=Math.round(h)+'px';
}

window.addEventListener('resize',()=>{
const c=document.getElementById('slide-container');
if(c)resizeSlideContainer(c);
});

// ---- Element selection: Ctrl+click multi-select ----
function handleSelect(e, index){
if(e.ctrlKey||e.metaKey){
// Toggle this shape in selection
const ids=state.selectedIds.slice();
const pos=ids.indexOf(index);
if(pos>=0)ids.splice(pos,1);
else ids.push(index);
selectShapes(ids);
}else{
// Single select (deselect others if clicking a different shape)
selectShapes(state.selectedIds.length===1&&state.selectedIds[0]===index?[]:[index]);
}
}

// Click empty area to deselect
document.addEventListener('click',e=>{
if(!e.target.closest('.shape-el')&&!e.target.closest('.shape-card'))clearSelection();
});

function selectShapes(indices){
state.selectedIds=indices;
highlightShapes(indices);
highlightCards(indices);
const detail=indices.map(i=>{
const s=state.shapes[i];
return (s.role||s.id||'?')+(s.text_preview?' "'+s.text_preview+'"':'');
}).join('; ')||'未选中';
selInfo.textContent=detail||'未选中';
if(indices.length){
fetch('/render/select-element',{
method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({slide:state.currentSlide,selected:indices.map(i=>({index:i,role:state.shapes[i].role,id:state.shapes[i].id,type:state.shapes[i].type})),count:indices.length})
}).catch(()=>{});
}
}

function clearSelection(){selectShapes([])}

// ---- Slide navigation ----
function updateSlideNav(){
const t=state.totalSlides;
slideInd.textContent=t?`${state.currentSlide+1} / ${t}`:'0 / 0';
prevBtn.disabled=state.currentSlide<=0;
nextBtn.disabled=state.currentSlide>=t-1;
}
prevBtn.addEventListener('click',()=>{if(state.currentSlide>0){state.currentSlide--;updateSlideNav();loadSlide(state.currentSlide);saveState()}});
nextBtn.addEventListener('click',()=>{if(state.currentSlide<state.totalSlides-1){state.currentSlide++;updateSlideNav();loadSlide(state.currentSlide);saveState()}});
window.addEventListener('beforeunload',saveState);
</script>
</body>
</html>
